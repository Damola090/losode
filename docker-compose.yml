services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: losode-app
    container_name: losode-app
    restart: unless-stopped
    tty: true
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www
    environment:
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
